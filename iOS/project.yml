name: Gradewell
options:
  bundleIdPrefix: com.shimondeitel.gradewell
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Gradewell:
    type: application
    platform: iOS
    sources:
      - path: Gradewell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gradewell
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Gradewell/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GradewellTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GradewellTests
      - path: Gradewell.storekit
    dependencies:
      - target: Gradewell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gradewell.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GradewellUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GradewellUITests
    dependencies:
      - target: Gradewell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gradewell.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Gradewell:
    build:
      targets:
        Gradewell: all
        GradewellTests: [test]
        GradewellUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Gradewell.storekit
    test:
      config: Debug
      storeKitConfiguration: Gradewell.storekit
      targets:
        - GradewellTests
        - GradewellUITests
    archive:
      config: Release
